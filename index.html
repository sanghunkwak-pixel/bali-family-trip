<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#174b3e" />
<title>발리 가족여행 v5.7</title>
<style>
:root{
  --navy:#17345b; --green:#174b3e; --teal:#2d8a78; --orange:#d86d3d;
  --gold:#dfad37; --paper:#f6f1e7; --card:#ffffff; --line:#e3dccc;
  --ink:#22302c; --muted:#6d7772; --white:#fff;
  --ok:#2d8a78; --wait:#d89a3d; --prog:#4a7bb0; --danger:#c0553a;
  --safe-b: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:"Apple SD Gothic Neo","Malgun Gothic",system-ui,-apple-system,sans-serif;
  background:var(--paper); color:var(--ink);
  font-size:15px; line-height:1.5;
  padding-bottom:calc(66px + var(--safe-b));
}
a{color:var(--teal); text-decoration:none;}
.hidden{display:none !important;}

/* Header */
header{
  position:sticky; top:0; z-index:40;
  background:linear-gradient(135deg,var(--green),var(--teal));
  color:#fff; padding:14px 16px 12px;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
}
header .htitle{font-size:18px; font-weight:800; letter-spacing:-.02em;}
header .hsub{font-size:12px; opacity:.85; margin-top:2px;}
header .hbadge{
  float:right; background:rgba(255,255,255,.18); border-radius:20px;
  font-size:11px; padding:4px 10px; font-weight:700; margin-top:2px;
}

/* Content */
main{padding:14px 14px 22px; max-width:640px; margin:0 auto;}
h2.sec{font-size:16px; font-weight:800; margin:20px 0 10px; color:var(--green); display:flex; align-items:center; gap:7px;}
h2.sec:first-child{margin-top:4px;}
.card{
  background:var(--card); border:1px solid var(--line);
  border-radius:14px; padding:13px 14px; margin-bottom:11px;
  box-shadow:0 1px 3px rgba(30,40,35,.05);
}
.card.tight{padding:11px 13px;}
.muted{color:var(--muted);}
.small{font-size:12.5px;}
.xsmall{font-size:11.5px;}
.b{font-weight:700;} .b8{font-weight:800;}
.row{display:flex; gap:10px;}
.row.between{justify-content:space-between; align-items:center;}
.wrapline{white-space:pre-line;}

/* chips / tags */
.tag{display:inline-block; font-size:11px; font-weight:800; padding:3px 8px; border-radius:20px; white-space:nowrap;}
.t-ok{background:#e2f1ec; color:var(--ok);}
.t-wait{background:#fbf0da; color:#b57d1e;}
.t-prog{background:#e6eef7; color:var(--prog);}
.t-danger{background:#f7e4de; color:var(--danger);}
.t-grey{background:#eee9dd; color:#8a8474;}
.grp{display:inline-block; font-size:10.5px; font-weight:800; padding:2px 7px; border-radius:6px; background:#eef4f1; color:var(--teal);}
.grp.p{background:#f3ecf7; color:#8256a8;}
.grp.s{background:#fbeee6; color:var(--orange);}
.grp.d{background:#e6eef7; color:var(--prog);}

/* Overview grid */
.kv{display:flex; gap:9px; padding:9px 0; border-bottom:1px dashed var(--line);}
.kv:last-child{border-bottom:none;}
.kv .k{flex:0 0 78px; color:var(--muted); font-size:12.5px; font-weight:700;}
.kv .v{flex:1; font-size:13.5px;}
.members{display:flex; flex-wrap:wrap; gap:6px; margin-top:4px;}
.mem{background:#eef4f1; border-radius:10px; padding:6px 9px; font-size:12px; font-weight:700;}
.mem span{font-weight:400; color:var(--muted); font-size:11px;}

/* Timeline */
.daytabs{display:flex; gap:7px; overflow-x:auto; padding:4px 0 10px; margin:0 -14px; padding-left:14px; padding-right:14px; -webkit-overflow-scrolling:touch;}
.daytab{flex:0 0 auto; border:1px solid var(--line); background:#fff; border-radius:11px; padding:7px 11px; font-weight:800; font-size:13px; color:var(--navy); text-align:center; min-width:56px; cursor:pointer;}
.daytab .d2{display:block; font-size:10.5px; color:var(--muted); font-weight:600;}
.daytab.active{background:var(--green); color:#fff; border-color:var(--green);}
.daytab.active .d2{color:#cfe6dd;}

.tl{position:relative; padding-left:16px;}
.tl::before{content:""; position:absolute; left:4px; top:6px; bottom:6px; width:2px; background:var(--line);}
.ti{position:relative; margin-bottom:11px;}
.ti::before{content:""; position:absolute; left:-15px; top:15px; width:9px; height:9px; border-radius:50%; background:var(--teal); border:2px solid #fff; box-shadow:0 0 0 1px var(--line);}
.ti .time{font-size:11.5px; font-weight:800; color:var(--teal); letter-spacing:-.01em;}
.ti .ttl{font-weight:800; font-size:14px; margin:2px 0 3px;}
.ti .det{font-size:12.5px; color:#4a544f;}
.ti .meta{margin-top:6px; display:flex; gap:6px; flex-wrap:wrap; align-items:center;}
.pin{font-size:11.5px; color:var(--orange); font-weight:700;}

/* Map */
.daynote{font-size:12.5px; color:var(--muted); margin:-4px 2px 12px; line-height:1.45;}
.leg{display:grid; grid-template-columns:52px 1fr; gap:10px; padding:13px; border-bottom:1px solid var(--line); cursor:pointer;}
.leg:last-child{border-bottom:none;}
.leg.active{background:#eef7f3; box-shadow:inset 4px 0 0 var(--teal);}
.legtime{color:var(--navy); font-size:14px; font-weight:900;}
.legttl{font-size:13.5px; font-weight:800; line-height:1.3;}
.legmeta{margin-top:3px; color:var(--muted); font-size:11.5px; line-height:1.4;}
.legtag{display:inline-block; margin-top:6px; padding:3px 8px; border-radius:6px; background:#fff3d6; color:#815710; font-size:10.5px; font-weight:800;}
.mapbox{background:#fff; border:1px solid var(--line); border-radius:14px; overflow:hidden; margin-top:12px;}
.mapcur{padding:12px 14px 4px;}
.mapcurttl{font-size:14px; font-weight:800; color:var(--green); line-height:1.3;}
.mapcurdet{font-size:11.5px; color:var(--muted); margin-top:3px; line-height:1.4;}
.mapacts{display:flex; gap:8px; padding:11px 14px 12px;}
.mapacts .action{flex:1; text-align:center; border:1px solid var(--navy); border-radius:10px; padding:11px; background:var(--navy); color:#fff; font-size:13px; font-weight:800;}
.mapacts .action.sec{background:#fff; color:var(--navy);}
.mapframe{display:block; width:100%; height:52vh; min-height:300px; border:0; background:#e8ecea;}
.maphint{padding:11px 14px; background:#fff8e8; border-top:1px solid var(--line); color:#745018; font-size:11.5px; line-height:1.5; font-weight:600;}

/* Budget */
.bsummary{background:linear-gradient(135deg,#1d4a3c,#2d8a78); color:#fff; border-radius:16px; padding:15px; margin-bottom:14px;}
.bsummary .brow{display:flex; justify-content:space-between; padding:5px 0; font-size:13px;}
.bsummary .brow.big{font-size:15px; font-weight:800; border-top:1px solid rgba(255,255,255,.25); margin-top:6px; padding-top:9px;}
.bsummary .amt{font-variant-numeric:tabular-nums; font-weight:800;}
.bsummary .pos{color:#bfe9c5;} .bsummary .neg{color:#ffcdb8;}
.bbar{height:8px; border-radius:6px; background:rgba(255,255,255,.2); overflow:hidden; margin-top:9px;}
.bbar > i{display:block; height:100%; background:var(--gold);}

.bfilter{display:flex; gap:6px; margin-bottom:12px;}
.bfilter button{flex:1; border:1px solid var(--line); background:#fff; border-radius:9px; padding:8px; font-weight:800; font-size:12.5px; color:var(--muted);}
.bfilter button.active{background:var(--green); color:#fff; border-color:var(--green);}

.bitem{border:1px solid var(--line); border-radius:12px; padding:11px 12px; margin-bottom:9px; background:#fff;}
.bitem.done{background:#f4faf7; border-color:#cfe7dd;}
.bitem .bhead{display:flex; justify-content:space-between; gap:8px; align-items:flex-start;}
.bitem .bname{font-weight:800; font-size:13.5px;}
.bitem .bcat{font-size:10.5px; color:var(--muted); font-weight:700;}
.bitem .bnote{font-size:11.5px; color:var(--muted); margin-top:5px; white-space:pre-line;}
.bitem .bfig{text-align:right; white-space:nowrap;}
.bitem .best{font-size:11px; color:var(--muted); text-decoration:none;}
.bitem .bact{font-size:15px; font-weight:800; font-variant-numeric:tabular-nums;}
.bctl{display:flex; gap:8px; align-items:center; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line);}
.bctl input{flex:1; min-width:0; border:1px solid var(--line); border-radius:9px; padding:10px 11px; font-size:15px; font-variant-numeric:tabular-nums; -webkit-appearance:none;}
.curtog{flex:0 0 auto; display:flex; border:1px solid var(--line); border-radius:9px; overflow:hidden;}
.curtog button{border:none; background:#fff; color:var(--muted); font-weight:800; font-size:12px; padding:10px 11px;}
.curtog button.on{background:var(--teal); color:#fff;}
.convhint{font-size:11.5px; color:var(--muted); margin:7px 2px 9px; line-height:1.4;}
.toggle{display:block; width:100%; border:none; border-radius:10px; padding:11px; font-weight:800; font-size:13px; color:#fff; background:var(--wait);}
.toggle.on{background:var(--ok);}
.bdone{margin-top:10px; padding-top:10px; border-top:1px dashed var(--line);}
.bdonefig{font-size:13px; margin-bottom:9px;}
.bdonefig b{font-size:16px; color:var(--ok); font-variant-numeric:tabular-nums;}
.bhint{font-size:11.5px; color:var(--muted); margin:2px 2px 12px; line-height:1.45;}

/* Reservations */
.ritem{display:flex; gap:11px; padding:12px 0; border-bottom:1px solid var(--line);}
.ritem:last-child{border-bottom:none;}
.rchk{flex:0 0 22px; height:22px; border-radius:7px; border:2px solid var(--line); margin-top:2px; display:flex; align-items:center; justify-content:center; font-size:13px; color:#fff; font-weight:900;}
.rchk.on{background:var(--ok); border-color:var(--ok);}
.rbody{flex:1; min-width:0;}
.rtitle{font-weight:800; font-size:13.5px;}
.rmeta{font-size:11.5px; color:var(--muted); margin-top:2px;}
.rnote{font-size:11.5px; color:#59635e; margin-top:4px; white-space:pre-line;}
.rdead{font-size:11px; font-weight:800; color:var(--orange);}

/* Vehicle cards */
.vcard{border:1px solid var(--line); border-radius:14px; padding:0; margin-bottom:11px; overflow:hidden; background:#fff;}
.vhead{background:#f0f5f2; padding:10px 13px; display:flex; justify-content:space-between; align-items:center; gap:8px;}
.vseg{font-weight:800; font-size:13.5px; color:var(--green);}
.vday{font-size:11px; color:var(--muted); font-weight:700;}
.vbody{padding:11px 13px;}
.vline{display:flex; gap:8px; padding:4px 0; font-size:12.5px;}
.vline .vk{flex:0 0 62px; color:var(--muted); font-weight:700;}
.vline .vv{flex:1;}
.callbtn{display:inline-block; margin-top:3px; background:#eef4f1; color:var(--teal); font-weight:800; font-size:12px; padding:6px 11px; border-radius:9px;}

/* Info */
.acc{border:1px solid var(--line); border-radius:12px; margin-bottom:9px; background:#fff; overflow:hidden;}
.acc > summary{list-style:none; padding:12px 14px; font-weight:800; font-size:13.5px; cursor:pointer; display:flex; justify-content:space-between; align-items:center;}
.acc > summary::-webkit-details-marker{display:none;}
.acc > summary::after{content:"▾"; color:var(--muted); font-size:12px; transition:transform .2s;}
.acc[open] > summary::after{transform:rotate(180deg);}
.acc .abody{padding:0 14px 13px;}
.ei{padding:9px 0; border-bottom:1px dashed var(--line);}
.ei:last-child{border-bottom:none;}
.ei .ek{font-weight:800; font-size:12.5px; color:var(--green);}
.ei .ev{font-size:12.5px; color:#4a544f; margin-top:2px; white-space:pre-line;}
.emerg{background:#fdeee9; border:1px solid #f2c9bb;}
.emerg a{font-weight:800;}

.prep{display:flex; gap:10px; padding:9px 0; border-bottom:1px dashed var(--line); align-items:flex-start;}
.prep:last-child{border-bottom:none;}
.prep .pchk{flex:0 0 20px; height:20px; border-radius:6px; border:2px solid var(--line); margin-top:1px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:12px;}
.prep .pchk.on{background:var(--ok); border-color:var(--ok);}
.prep .pname{font-size:13px; font-weight:600;}
.prep .pmeta{font-size:11px; color:var(--muted);}
.prep.done .pname{text-decoration:line-through; color:var(--muted);}

.rst{display:flex; align-items:center; gap:9px; padding:11px 0; border-bottom:1px solid var(--line);}
.rst:last-child{border-bottom:none;}
.rst .rsb{flex:0 0 66px; font-weight:800; font-size:11.5px; color:var(--orange);}
.rst .rsn{flex:1;} .rst .rsn b{font-size:13.5px;} .rst .rsn .d{font-size:11.5px; color:var(--muted);}

/* Bottom nav */
nav{
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  background:#fff; border-top:1px solid var(--line);
  display:flex; padding-bottom:var(--safe-b);
  box-shadow:0 -2px 12px rgba(0,0,0,.06);
}
nav button{
  flex:1; border:none; background:none; padding:8px 2px 7px;
  font-size:10.5px; font-weight:700; color:var(--muted);
  display:flex; flex-direction:column; align-items:center; gap:3px;
}
nav button .ic{font-size:19px; line-height:1;}
nav button.active{color:var(--green);}
.resetbar{text-align:center; margin-top:18px;}
.resetbar button{background:none; border:1px solid var(--line); border-radius:9px; padding:8px 14px; color:var(--muted); font-size:11.5px; font-weight:700;}
</style>
</head>
<body>
<header>
  <span class="hbadge" id="hbadge">D-11</span>

function gmapSearch(q){ return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(q); }
function gmapDir(stops){
  const qs = stops.map(s=>encodeURIComponent(s));
  const origin = qs[0], dest = qs[qs.length-1];
  const way = qs.slice(1,-1).join("%7C");
  let u = "https://www.google.com/maps/dir/?api=1&origin="+origin+"&destination="+dest+"&travelmode=driving";
  if(way) u += "&waypoints="+way;
  return u;
}

function calcBudget(){
  let done=0, todoEst=0;
  BUDGET.forEach((b,i)=>{
    const st = stBudget[i]||{};
    const isDone = st.done!==undefined ? st.done : b[6];
    if(isDone){
      const actual = (st.actual!==undefined && st.actual!==null && st.actual!=="") ? Number(st.actual) : b[5];
      done += actual;
    } else {
      todoEst += b[5];
    }
  });
  const localTotal = done + todoEst;
  const grand = FLIGHT_KRW + LODGE_KRW + localTotal;
  const diff = TARGET_KRW - grand;
  const usedPct = Math.round(grand/TARGET_KRW*100);
  return {done, todoEst, localTotal, grand, diff, usedPct};
}

    }
    h += `</div>`;
  });
  app.innerHTML = h;

function convText(raw,cur){
  const n = Number(raw);
  if(raw===""||isNaN(n)||n<=0) return "금액을 비워두고 완료하면 견적 금액으로 처리됩니다.";
  if(cur==='IDR') return `≈ ${won(n*RATE)}원 으로 확정 (예산환율 0.084)`;
  return `${won(n)}원 으로 확정`;
}

/* counts */
function resvCounts(){
  let done=0,wait=0,prog=0;
  RESV.forEach((r,i)=>{
    const on = stResv[i]!==undefined ? stResv[i] : (r[5]==='done');
    if(on) done++;
    else if(r[5]==='prog') prog++;
    else wait++;
  });
  return {done,wait,prog,total:RESV.length};
}

function setLeg(i){ mapLeg=i; renderMap(); }
function setBF(f){ bFilter=f; renderBudget(); }
function toggleDone(i){
  const st = stBudget[i]||{};
  const isDone = st.done!==undefined ? st.done : BUDGET[i][6];
  if(!isDone){
    // 완료 처리: 입력 금액을 KRW로 환산해 확정
    const n = Number(st.raw);
    if(st.raw!==undefined && st.raw!=="" && !isNaN(n) && n>0){
      st.actual = (st.cur==='IDR') ? Math.round(n*RATE) : Math.round(n);
    } else {
      st.actual = BUDGET[i][5]; // 미입력 시 견적으로 확정
    }
    st.done = true;
  } else {
    // 미완료로 되돌리기 (입력값·통화는 유지해 수정 가능)
    st.done = false;
  }
  stBudget[i]=st; save(LS.budget,stBudget);
  renderBudget();
}
function setRaw(i,v){
  const st = stBudget[i]||{};
  st.raw = v; if(!st.cur) st.cur='KRW';
  stBudget[i]=st; save(LS.budget,stBudget);
  const el = document.getElementById('conv-'+i);
  if(el) el.textContent = convText(v, st.cur); // 요약·포커스 유지
}
function setCur(i,c){
  const st = stBudget[i]||{};
  st.cur = c;
  stBudget[i]=st; save(LS.budget,stBudget);
  renderBudget();
}
function toggleResv(i){
  const base = RESV[i][5]==='done';
  const cur = stResv[i]!==undefined ? stResv[i] : base;
  stResv[i]=!cur; save(LS.resv,stResv);
  render(curTab);
}
function togglePrep(i){ stPrep[i]=!stPrep[i]; save(LS.prep,stPrep); renderInfo(); }
function resetAll(){
  if(confirm("입력한 결산 금액·예약체크·준비물 체크를 모두 지울까요?")){
    localStorage.removeItem(LS.budget); localStorage.removeItem(LS.resv); localStorage.removeItem(LS.prep);
    stBudget={}; stResv={}; stPrep={};
    render(curTab);
  }
}

/* D-day badge */
(function(){
  try{
    const dep=new Date(2026,7,2), now=new Date();
    const d=Math.ceil((dep-now)/86400000);
    document.getElementById("hbadge").textContent = d>0?("D-"+d):(d===0?"D-DAY":"여행중");
  }catch(e){}
})();

document.querySelectorAll("#nav button").forEach(b=> b.addEventListener("click",()=>go(b.dataset.t)));
render("home");
</script>
